<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accelbiz Tools</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Inter&family=Nunito&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="nav-container">
    <div class="logo">
  <img src="assets/logo.png" alt="Accelbiz Logo">

</div>
    <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#">Tools</a>
      <a href="#">Contact</a>
    </nav>

    <div class="hamburger" id="hamburger">
      <i class="bi bi-list"></i>
    </div>
  </div>
</header>

<!-- HERO -->
<section class="hero">

      <h1>

    <br>

<!-- TOOLS -->
<section class="tools">
  <h2>All Tools</h2>

  <div class="tools-grid">

    <a href="tools/jpg-to-png.html" class="tool-card">

    <a href="tools/pdf-to-word.html" class="tool-card">
      <i class="bi bi-file-earmark"></i>

    </a>

    <a href="#" class="tool-card">
      <i class="bi bi-file-lock"></i>
      <h4>Remove PDF Password</h4>
    </a>

    <a href="#" class="tool-card">
      <i class="bi bi-arrow-repeat"></i>

    </a>

    <a href="#" class="tool-card">
      <i class="bi bi-layers"></i>
      <h4>PDF Page Manager</h4>
    </a>

  </div>
</section>

<script>
const hamburger = document.getElementById("hamburger");
const navLinks = document.querySelector(".nav-links");

hamburger.addEventListener("click", () => {
  navLinks.classList.toggle("active");
});
</script>

</body>
</html>
